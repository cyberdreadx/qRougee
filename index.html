<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Primary Meta -->
    <title>qRougee — Decentralized Music</title>
    <meta name="description" content="Own your sound. Stream, trade, and earn royalties on RougeChain." />

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="/icon-192.jpg" />
    <link rel="apple-touch-icon" href="/icon-192.jpg" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="qRougee" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="qRougee — Decentralized Music" />
    <meta property="og:description" content="Own your sound. Stream, trade, and earn royalties on RougeChain." />
    <meta property="og:image" content="https://rougee.app/og-image.png" />
    <meta property="og:url" content="https://rougee.app" />
    <meta property="og:site_name" content="qRougee" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="qRougee — Decentralized Music" />
    <meta name="twitter:description" content="Own your sound. Stream, trade, and earn royalties on RougeChain." />
    <meta name="twitter:image" content="https://rougee.app/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
